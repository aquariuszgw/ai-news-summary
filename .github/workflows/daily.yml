name: 每日AI资讯摘要

on:
  # 定时触发：每天北京时间早上8:00（UTC 0:00）
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发，方便测试
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 安装依赖  
        run: |  
          pip install feedparser openai requests
      
      - name: 运行AI资讯摘要
        run: python summary.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      
      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: |
            *.log
